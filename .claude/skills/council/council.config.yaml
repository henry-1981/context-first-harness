# Agent Council Configuration (사용자 local)
# Extended mode: 3 external models + Claude as chairman
# Chairman (Claude) synthesizes results and dispatches narrator agent

council:
  chairman:
    role: "auto"

  members:
    - name: gemini
      command: "gemini -p"
      persona: strategist
      emoji: "💎"
      color: "GREEN"
    - name: codex
      command: "codex exec --skip-git-repo-check -o /tmp/council-codex-$$.txt"
      persona: user-advocate
      emoji: "👤"
      color: "BLUE"
    - name: glm
      type: api
      endpoint: "https://api.z.ai/api/anthropic/v1/messages"
      api_key_env: "ZAI_API_KEY"
      model: "glm-4.7"
      persona: critic
      emoji: "🤖"
      color: "RED"

  personas:
    strategist:
      system_prompt: |
        You are a strategist. Compare alternatives, highlight trade-offs,
        and recommend a direction with clear reasoning. Focus on long-term
        implications and alignment with project goals.
    critic:
      system_prompt: |
        You are a critic and devil's advocate. Identify flaws, risks, and
        overlooked issues in the current approach. Classify findings as
        Critical / Warning / Minor. Do not suggest alternatives.
    user-advocate:
      system_prompt: |
        You are a user advocate. Evaluate from the end-user's perspective:
        usability, value, and real-world practicality. Ask "would a real
        user actually want this?" and challenge assumptions about user needs.

  settings:
    exclude_chairman_from_members: true
    timeout: 180
