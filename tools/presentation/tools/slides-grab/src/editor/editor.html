<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide Editor</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    :root {
      --bg-0: #030711;
      --bg-1: #0a0f1a;
      --panel: #0f172a;
      --panel-2: #020617;
      --border: #1e293b;
      --border-soft: #172033;
      --text-0: #f8fafc;
      --text-1: #94a3b8;
      --text-2: #64748b;
      --accent: #3b82f6;
      --accent-2: #60a5fa;
      --danger: #ef4444;
      --success: #22c55e;
      --warn: #f59e0b;
      --mono: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      --sans: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      --ring: hsla(213, 27%, 84%, 0.15);
      --radius: 8px;
      --radius-sm: 6px;
      --radius-lg: 12px;
      --shadow-card: 0 1px 2px rgba(0,0,0,0.3), 0 4px 8px rgba(0,0,0,0.2);
      --transition: 150ms ease-out;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg-0);
      font-family: var(--sans);
      color: var(--text-0);
      letter-spacing: 0.01em;
    }

    .editor-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .nav-bar {
      height: 44px;
      background: #08090b;
      border-bottom: 1px solid #171a20;
      display: flex;
      align-items: center;
      padding: 0 14px;
      flex-shrink: 0;
      z-index: 100;
      gap: 12px;
    }


    .nav-bar button {
      height: 30px;
      background: #111318;
      color: var(--text-0);
      border: 1px solid #1b2028;
      border-radius: 999px;
      padding: 0 12px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: all var(--transition);
    }

    .nav-bar button:hover { background: #171b22; border-color: #252b35; }
    .nav-bar button:disabled { opacity: 0.3; cursor: default; }
    .nav-bar button:disabled:hover { background: #111318; border-color: #1b2028; }

    .slide-counter {
      color: var(--text-1);
      font-size: 12px;
      font-weight: 600;
      min-width: 84px;
      text-align: center;
      font-family: var(--mono);
    }

    .nav-spacer { flex: 1; }

    .nav-filename {
      color: var(--text-1);
      font-size: 12px;
      font-weight: 600;
      font-family: var(--mono);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 180px;
    }

    .main-content {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0;
    }

    .slide-panel {
      flex: 1;
      display: flex;
      min-width: 0;
      overflow: hidden;
      padding: 24px 28px;
      background: #050607;
    }

    .slide-stage {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      position: relative;
    }

    .select-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex: 1;
    }

    .select-toolbar[hidden] {
      display: none !important;
    }

    .select-toolbar {
      justify-content: flex-start;
      flex-wrap: nowrap;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .tool-icon-btn {
      position: relative;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text-0);
      border-radius: var(--radius-lg);
      min-width: 46px;
      height: 46px;
      padding: 0 12px;
      font-size: 14px;
      font-family: var(--mono);
      font-weight: 700;
      cursor: pointer;
      transition: all var(--transition);
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .tool-icon-btn:hover {
      background: var(--panel);
    }

    .tool-icon-btn.active {
      border-color: var(--accent);
      background: hsl(217 91% 60% / 0.28);
      color: #fff;
      box-shadow: 0 0 0 1px var(--accent), inset 0 1px 0 hsl(217 91% 70% / 0.15);
    }

    .tool-icon-btn:disabled {
      opacity: 0.42;
      cursor: default;
      color: var(--text-2);
      background: var(--panel-2);
    }

    .tool-icon-btn:disabled:hover {
      background: var(--panel-2);
    }

    .tool-icon-btn.tight {
      min-width: 42px;
      width: 42px;
      padding: 0;
    }

    .tool-icon {
      width: 16px;
      height: 16px;
      display: block;
      stroke: currentColor;
      stroke-width: 1.8;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex: 0 0 auto;
    }

    .slide-wrapper {
      position: absolute;
      width: 1920px;
      height: 1080px;
      transform-origin: top left;
      z-index: 1;
      overflow: hidden;
    }

    .slide-wrapper iframe {
      width: 1920px;
      height: 1080px;
      transform: none;
      transform-origin: top left;
      border: none;
      border-radius: 0;
      background: #fff;
      display: block;
      position: relative;
      z-index: 1;
    }

    .object-layer {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }

    .object-outline {
      position: absolute;
      display: none;
      border-radius: 6px;
      pointer-events: none;
    }

    .object-outline.hover {
      border: 1.5px dashed rgba(96, 165, 250, 0.72);
      background: rgba(96, 165, 250, 0.06);
    }

    .object-outline.selected {
      outline: 2px solid rgba(255, 255, 255, 0.9);
      border: 3px solid #EF4444;
      background: transparent;
      box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.25);
      border-radius: 2px;
    }

    .resize-handle {
      position: absolute;
      width: 12px; height: 12px;
      background: #EF4444;
      border: 2px solid #fff;
      border-radius: 2px;
      pointer-events: none;
      z-index: 12;
      display: none;
    }
    .resize-handle.nw { top: -5px; left: -5px; cursor: nwse-resize; }
    .resize-handle.n  { top: -5px; left: 50%; margin-left: -5px; cursor: ns-resize; }
    .resize-handle.ne { top: -5px; right: -5px; cursor: nesw-resize; }
    .resize-handle.w  { top: 50%; margin-top: -5px; left: -5px; cursor: ew-resize; }
    .resize-handle.e  { top: 50%; margin-top: -5px; right: -5px; cursor: ew-resize; }
    .resize-handle.sw { bottom: -5px; left: -5px; cursor: nesw-resize; }
    .resize-handle.s  { bottom: -5px; left: 50%; margin-left: -5px; cursor: ns-resize; }
    .resize-handle.se { bottom: -5px; right: -5px; cursor: nwse-resize; }

    /* Slide-whole selection — full border + label */
    .slide-whole-brackets {
      position: absolute;
      inset: -3px;
      pointer-events: none;
      display: none;
      z-index: 11;
      border: 4px solid #EF4444;
      border-radius: 4px;
      background: transparent;
      box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.2);
    }

    .slide-whole-label {
      position: absolute;
      top: -48px;
      left: 50%;
      transform: translateX(-50%);
      background: #EF4444;
      color: #fff;
      font-size: 24px;
      font-weight: 700;
      padding: 6px 24px;
      border-radius: 8px;
      white-space: nowrap;
      pointer-events: none;
      display: none;
      z-index: 11;
      letter-spacing: 0.05em;
    }

    /* Tag label — disabled per user feedback */

    /* Floating AI Edit input */
    .floating-ai-input {
      position: absolute;
      display: none;
      z-index: 20;
      width: 800px;
      pointer-events: auto;
    }
    .floating-ai-input-inner {
      background: var(--panel);
      border: 2px solid var(--accent);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .floating-ai-input-label {
      font-size: 22px;
      color: var(--text-1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .floating-ai-input input {
      width: 100%;
      background: var(--bg-1);
      border: 2px solid var(--border);
      border-radius: 8px;
      color: var(--text-0);
      font-family: var(--sans);
      font-size: 36px;
      padding: 14px 18px;
      outline: none;
    }
    .floating-ai-input input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.3);
    }

    .draw-layer {
      position: absolute;
      inset: 0;
      z-index: 8;
      pointer-events: auto;
      cursor: pointer;
    }

    .status-bar {
      min-height: 40px;
      background: #08090b;
      border-top: 1px solid #15181d;
      display: flex;
      align-items: center;
      padding: 0 18px;
      font-size: 15px;
      color: var(--text-1);
      flex-shrink: 0;
      gap: 16px;
      font-family: var(--sans);
      font-weight: 500;
    }

    .status-message {
      flex: 1;
      text-align: right;
      color: var(--text-1);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Editor sidebar ── */
    .editor-sidebar {
      width: 336px;
      min-width: 336px;
      border-left: 1px solid #171a20;
      background: #0a0c0f;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .sidebar-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px;
      min-height: 0;
    }

    .sidebar-panel {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .sidebar-panel[hidden] {
      display: none !important;
    }

    .sidebar-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .sidebar-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: #9aa1b0;
      font-family: var(--sans);
    }

    .sidebar-divider {
      height: 1px;
      background: #16191f;
      margin: 2px 0;
    }

    .sidebar-input {
      flex: 1;
      min-width: 0;
      height: 36px;
      border-radius: 12px;
      border: 1px solid #1c2027;
      background: #111318;
      color: #f5f7fb;
      font-size: 12px;
      font-family: var(--sans);
      padding: 0 11px;
      outline: none;
    }
    textarea.sidebar-input {
      height: auto;
      padding: 9px 11px;
      resize: vertical;
      line-height: 1.5;
      font-size: 14px;
    }

    .sidebar-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--ring); }
    .sidebar-input:disabled { opacity: 0.4; cursor: default; }

    .sidebar-label-primary {
      font-size: 14px;
      font-weight: 700;
      color: #dce1e9;
    }

    .sidebar-compact-toolbar {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 4px;
      width: 100%;
    }

    .toolbar-divider {
      width: 1px;
      height: 20px;
      background: #1f2530;
      margin: 0 2px;
      flex-shrink: 0;
    }

    .tool-icon-btn.compact {
      min-width: 30px;
      flex: 1;
      height: 34px;
      border-radius: 8px;
      padding: 0;
    }

    .toolbar-color {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid #1c2027;
      background: #111318;
      cursor: pointer;
      padding: 2px;
      flex-shrink: 0;
    }
    .toolbar-color:disabled { opacity: 0.35; cursor: default; }

    .toolbar-size-input {
      height: 34px;
      border-radius: 8px;
      border: 1px solid #1c2027;
      background: #111318;
      color: #f5f7fb;
      font-size: 13px;
      font-family: var(--mono);
      text-align: center;
      padding: 0 10px;
      outline: none;
      flex: 1;
      min-width: 0;
    }
    .toolbar-size-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--ring); }
    .toolbar-size-input:disabled { opacity: 0.4; cursor: default; }

    .toolbar-field {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      flex: 1;
    }

    .toolbar-field-label {
      color: #9aa1b0;
      font-size: 12px;
      font-family: var(--sans);
      white-space: nowrap;
    }

    .toolbar-row-2 {
      gap: 10px;
    }

    .sidebar-btn-primary {
      width: 100%;
      height: 36px;
      border-radius: 10px;
      border: 1px solid #1f2530;
      background: #111318;
      color: #f5f7fb;
      font-size: 13px;
      font-family: var(--sans);
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
    }
    .sidebar-btn-primary:hover:not(:disabled) { background: #171b22; border-color: #282e38; }
    .sidebar-btn-primary:disabled { opacity: 0.35; cursor: default; }

    .sidebar-field-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sidebar-btn-sm {
      height: 36px;
      padding: 0 12px;
      border-radius: 10px;
      border: 1px solid #1f2530;
      background: #111318;
      color: #f5f7fb;
      font-size: 12px;
      font-family: var(--sans);
      font-weight: 600;
      cursor: pointer;
      flex: 0 0 auto;
      transition: all var(--transition);
    }

    .sidebar-btn-sm:hover:not(:disabled) { background: #171b22; border-color: #282e38; }
    .sidebar-btn-sm:disabled { opacity: 0.35; cursor: default; }


    .sidebar-icon-grid {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .editor-sidebar .tool-icon-btn {
      min-width: 36px;
      height: 36px;
      border-radius: 10px;
      padding: 0 8px;
      border-color: #1f2530;
      background: #111318;
    }

    .editor-sidebar .tool-icon-btn.tight {
      min-width: 36px;
      width: 36px;
      padding: 0;
    }

    .shortcut-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .shortcut-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: #6f7784;
    }

    .shortcut-row kbd {
      display: inline-block;
      min-width: 40px;
      padding: 2px 6px;
      background: #111318;
      border: 1px solid #1b2028;
      border-radius: 4px;
      font-family: var(--sans);
      font-size: 11px;
      color: #9aa1b0;
      text-align: center;
    }

    .sidebar-hint {
      flex: 0 0 auto;
      padding: 10px 14px;
      border-top: 1px solid #16191f;
      color: #8c93a0;
      font-size: 13px;
      font-family: var(--sans);
      min-height: 36px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .ai-edit-btn-row {
      display: flex;
      gap: 6px;
    }

    .ai-edit-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      margin-left: 6px;
    }

    .ai-edit-badge.warn {
      background: var(--warn);
      color: #000;
    }

    .ai-edit-badge.danger {
      background: var(--danger);
      color: #fff;
    }

    .ai-edit-status {
      font-size: 10px;
      font-weight: 400;
      color: var(--text-2);
    }

    .ai-edit-status.warn {
      color: var(--warn);
    }

    .ai-edit-status.danger {
      color: var(--danger);
    }

    .ai-edit-queue {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 280px;
      overflow-y: auto;
    }

    .ai-edit-queue:empty {
      display: none;
    }

    .ai-edit-item {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #1c2027;
      background: #111318;
      font-size: 12px;
      color: #d9dee7;
    }

    .ai-edit-item-body {
      flex: 1;
      min-width: 0;
    }

    .ai-edit-item-file {
      color: #8ab4ff;
      font-weight: 600;
      font-size: 10px;
    }

    .ai-edit-item-target {
      color: #6f7784;
      font-size: 10px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .ai-edit-item-intent {
      color: #e2e8f0;
      margin-top: 2px;
    }

    .ai-edit-item-remove {
      background: none;
      border: none;
      color: #6f7784;
      cursor: pointer;
      font-size: 14px;
      padding: 0 2px;
      line-height: 1;
      flex-shrink: 0;
    }

    .ai-edit-item-remove:hover {
      color: var(--danger);
    }

    .ai-edit-clear-btn {
      margin-top: 4px;
      color: var(--text-2) !important;
      border-color: transparent !important;
      background: transparent !important;
    }

    .ai-edit-clear-btn:hover:not(:disabled) {
      color: var(--danger) !important;
    }

    :focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px var(--ring);
    }

    /* Layer 1 inline edit — contenteditable visual hint */
    [data-editable="true"]:focus,
    [contenteditable="true"]:focus {
      outline: 2px dashed var(--accent);
      outline-offset: 2px;
      background: rgba(59, 130, 246, 0.06);
    }

  </style>
</head>
<body>
  <div class="editor-container">
    <div class="nav-bar">
      <span class="nav-filename" id="nav-filename"></span>
      <button id="btn-prev" title="Previous slide (Left arrow)">&#9664; Prev</button>
      <span class="slide-counter" id="slide-counter">-- / --</span>
      <button id="btn-next" title="Next slide (Right arrow)">Next &#9654;</button>
      <div class="nav-spacer"></div>
      <button id="btn-undo" title="Undo (⌘Z)" disabled>↩</button>
      <button id="btn-redo" title="Redo (⌘⇧Z)" disabled>↪</button>
    </div>

    <div class="main-content">
      <div class="slide-panel" id="slide-panel">
        <div class="slide-stage" id="slide-stage">
          <div class="slide-wrapper" id="slide-wrapper">
            <iframe id="slide-iframe" sandbox="allow-same-origin allow-scripts allow-modals" loading="eager"></iframe>
            <div class="object-layer" id="object-layer">
              <div class="object-outline hover" id="object-hover-box"></div>
              <div class="object-outline selected" id="object-selected-box">
                <div class="resize-handle nw" data-handle="nw"></div>
                <div class="resize-handle n"  data-handle="n"></div>
                <div class="resize-handle ne" data-handle="ne"></div>
                <div class="resize-handle w"  data-handle="w"></div>
                <div class="resize-handle e"  data-handle="e"></div>
                <div class="resize-handle sw" data-handle="sw"></div>
                <div class="resize-handle s"  data-handle="s"></div>
                <div class="resize-handle se" data-handle="se"></div>
              </div>
              <div class="slide-whole-brackets" id="slide-whole-brackets"></div>
              <div class="slide-whole-label" id="slide-whole-label">슬라이드 전체</div>
            </div>
            <div class="draw-layer" id="draw-layer"></div>
          </div>
          <div class="floating-ai-input" id="floating-ai-input">
            <div class="floating-ai-input-inner">
              <div class="floating-ai-input-label" id="floating-ai-input-label"></div>
              <input type="text" id="floating-ai-input-field" placeholder="수정 의도를 입력하세요" autocomplete="off">
            </div>
          </div>
        </div>
      </div>

      <aside class="editor-sidebar" id="editor-sidebar">
        <div class="sidebar-body" id="sidebar-body">
          <div class="sidebar-panel" id="select-toolbar">
            <div class="sidebar-section">
              <span class="sidebar-label sidebar-label-primary">Text Edit</span>
              <div class="sidebar-field-row">
                <textarea id="popover-text-input" class="sidebar-input" rows="6" placeholder="Edit text..."></textarea>
              </div>
              <button type="button" class="sidebar-btn-primary" id="popover-apply-text">Set Text</button>
              <div class="sidebar-compact-toolbar">
                <button type="button" class="tool-icon-btn style-toggle compact" id="toggle-bold" title="Bold (⌘B)">
                  <svg class="tool-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M14 12a4 4 0 0 0 0-8H6v8"/><path d="M15 20a4 4 0 0 0 0-8H6v8"/></svg>
                </button>
                <button type="button" class="tool-icon-btn style-toggle compact" id="toggle-italic" title="Italic (⌘I)">
                  <svg class="tool-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M19 4h-9M14 20H5M15 4 9 20"/></svg>
                </button>
                <button type="button" class="tool-icon-btn style-toggle compact" id="toggle-underline" title="Underline (⌘U)">
                  <svg class="tool-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 4v6a6 6 0 0 0 12 0V4"/><path d="M4 20h16"/></svg>
                </button>
                <button type="button" class="tool-icon-btn style-toggle compact" id="toggle-strike" title="Strikethrough">
                  <svg class="tool-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M16 4H9a3 3 0 0 0-2.83 4"/><path d="M14 12a4 4 0 0 1 0 8H6"/><path d="M4 12h16"/></svg>
                </button>
                <span class="toolbar-divider"></span>
                <button type="button" class="tool-icon-btn align-btn compact" id="align-left" title="Align left">
                  <svg class="tool-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 6H3M15 12H3M17 18H3"/></svg>
                </button>
                <button type="button" class="tool-icon-btn align-btn compact" id="align-center" title="Align center">
                  <svg class="tool-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 6H3M17 12H7M19 18H5"/></svg>
                </button>
                <button type="button" class="tool-icon-btn align-btn compact" id="align-right" title="Align right">
                  <svg class="tool-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 6H3M21 12H9M21 18H7"/></svg>
                </button>
              </div>
              <div class="sidebar-compact-toolbar toolbar-row-2">
                <label class="toolbar-field">
                  <span class="toolbar-field-label">글꼴 색</span>
                  <input id="popover-text-color-input" class="toolbar-color" type="color" value="#111111" title="Text color">
                </label>
                <label class="toolbar-field">
                  <span class="toolbar-field-label">배경 색</span>
                  <input id="popover-bg-color-input" class="toolbar-color" type="color" value="#ffffff" title="Background color">
                </label>
                <span class="toolbar-divider"></span>
                <label class="toolbar-field">
                  <span class="toolbar-field-label">크기</span>
                  <input id="popover-size-input" class="toolbar-size-input" type="number" min="8" max="180" step="1" value="24" title="Font size (px)">
                </label>
              </div>
            </div>
            <div class="sidebar-divider"></div>
            <div class="sidebar-section" id="ai-edit-section">
              <div class="sidebar-label sidebar-label-primary" style="display:flex;align-items:center;gap:6px">AI Edit <span id="ai-edit-badge" class="ai-edit-badge" style="display:none">0</span><span id="ai-edit-status" class="ai-edit-status"></span></div>
              <div id="ai-edit-hint" class="ai-edit-hint" style="font-size:13px;color:var(--text-1);line-height:1.5">아무 키를 누르면 입력창이 열립니다 — 요소 선택 시 해당 요소, 빈 영역 클릭 시 슬라이드 전체 수정</div>
              <div class="ai-edit-btn-row">
                <button type="button" class="sidebar-btn-sm" id="btn-ai-edit-copy-all" style="flex:1" disabled>Copy All</button>
              </div>
              <div id="ai-edit-queue" class="ai-edit-queue"></div>
              <button type="button" class="sidebar-btn-sm ai-edit-clear-btn" id="btn-ai-edit-clear" style="width:100%;display:none">Clear Queue</button>
            </div>
          </div>
        </div>

        <div class="sidebar-hint" id="editor-hint">
          Click an element to select and edit it.
        </div>
      </aside>
    </div>

    <div class="status-bar">
      <span class="status-message" id="status-message"></span>
    </div>
  </div>

  <script type="module" src="/js/editor-init.js"></script>
</body>
</html>
