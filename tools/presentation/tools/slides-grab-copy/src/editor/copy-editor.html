<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Copy Editor</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    :root {
      --bg-0: #030711;
      --bg-1: #0a0f1a;
      --panel: #0f172a;
      --panel-2: #020617;
      --border: #1e293b;
      --text-0: #f8fafc;
      --text-1: #94a3b8;
      --text-2: #64748b;
      --accent: #3b82f6;
      --ring: hsla(213, 27%, 84%, 0.15);
      --radius: 8px;
      --radius-lg: 12px;
      --transition: 150ms ease-out;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg-0);
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      color: var(--text-0);
    }

    .editor-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .nav-bar {
      height: 44px;
      background: #08090b;
      border-bottom: 1px solid #171a20;
      display: flex;
      align-items: center;
      padding: 0 14px;
      flex-shrink: 0;
      gap: 12px;
    }

    .nav-bar button {
      height: 30px;
      background: #111318;
      color: var(--text-0);
      border: 1px solid #1b2028;
      border-radius: 999px;
      padding: 0 12px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: all var(--transition);
    }

    .nav-bar button:hover { background: #171b22; border-color: #252b35; }
    .nav-bar button:disabled { opacity: 0.3; cursor: default; }

    .nav-filename {
      color: var(--text-1);
      font-size: 12px;
      font-weight: 600;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 220px;
    }

    .slide-counter {
      color: var(--text-1);
      font-size: 12px;
      font-weight: 600;
      min-width: 84px;
      text-align: center;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .nav-spacer { flex: 1; }

    .main-content {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0;
    }

    .slide-panel {
      flex: 1;
      display: flex;
      min-width: 0;
      overflow: hidden;
      padding: 24px 28px;
      background: #050607;
    }

    .slide-stage {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      position: relative;
    }

    .slide-wrapper {
      position: absolute;
      width: 1920px;
      height: 1080px;
      transform-origin: top left;
      z-index: 1;
      overflow: hidden;
    }

    .slide-wrapper iframe {
      width: 1920px;
      height: 1080px;
      border: none;
      background: #fff;
      display: block;
    }

    .editor-sidebar {
      width: 336px;
      min-width: 336px;
      border-left: 1px solid #171a20;
      background: #0a0c0f;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .sidebar-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px;
      min-height: 0;
    }

    .sidebar-panel {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .sidebar-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .sidebar-label {
      font-size: 12px;
      font-weight: 600;
      color: #9aa1b0;
    }

    .sidebar-label-primary {
      font-size: 14px;
      font-weight: 700;
      color: #dce1e9;
    }

    .sidebar-divider {
      height: 1px;
      background: #16191f;
      margin: 2px 0;
    }

    .sidebar-input {
      width: 100%;
      border-radius: 12px;
      border: 1px solid #1c2027;
      background: #111318;
      color: #f5f7fb;
      font-size: 12px;
      padding: 10px 11px;
      outline: none;
    }

    .sidebar-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--ring);
    }

    .sidebar-btn-primary {
      width: 100%;
      height: 36px;
      border-radius: 10px;
      border: 1px solid #1f2530;
      background: #111318;
      color: #f5f7fb;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
    }

    .sidebar-btn-primary:hover:not(:disabled) { background: #171b22; border-color: #282e38; }
    .sidebar-btn-primary:disabled { opacity: 0.35; cursor: default; }

    .sidebar-hint {
      flex: 0 0 auto;
      padding: 10px 14px;
      border-top: 1px solid #16191f;
      color: #8c93a0;
      font-size: 13px;
      min-height: 36px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .status-bar {
      min-height: 40px;
      background: #08090b;
      border-top: 1px solid #15181d;
      display: flex;
      align-items: center;
      padding: 0 18px;
      font-size: 15px;
      color: var(--text-1);
      flex-shrink: 0;
    }

    .status-message {
      flex: 1;
      text-align: right;
      color: var(--text-1);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="editor-container">
    <div class="nav-bar">
      <span class="nav-filename" id="copy-nav-filename"></span>
      <button id="copy-btn-prev" title="Previous slide">&#9664; Prev</button>
      <span class="slide-counter" id="copy-slide-counter">-- / --</span>
      <button id="copy-btn-next" title="Next slide">Next &#9654;</button>
      <div class="nav-spacer"></div>
    </div>

    <div class="main-content">
      <div class="slide-panel">
        <div class="slide-stage" id="copy-slide-stage">
          <div class="slide-wrapper" id="copy-slide-wrapper">
            <iframe id="copy-slide-iframe" sandbox="allow-same-origin allow-scripts allow-modals" loading="eager"></iframe>
          </div>
        </div>
      </div>

      <aside class="editor-sidebar">
        <div class="sidebar-body">
          <div class="sidebar-panel">
            <div class="sidebar-section">
              <span class="sidebar-label sidebar-label-primary">템플릿 저장</span>
              <label class="sidebar-label">저장 방식</label>
              <label class="sidebar-label"><input type="radio" name="save-mode" id="save-mode-existing" checked /> 기존 템플릿에 추가</label>
              <label class="sidebar-label"><input type="radio" name="save-mode" id="save-mode-new" /> 새 템플릿 만들기</label>
              <div id="existing-template-section">
                <label class="sidebar-label">템플릿 이름
                  <select id="existing-template-name" class="sidebar-input" name="existing-template-name"></select>
                </label>
              </div>
              <div id="new-template-section" hidden>
                <label class="sidebar-label">템플릿 이름
                  <input id="new-template-name" class="sidebar-input" name="new-template-name" placeholder="warm" />
                </label>
              </div>
              <label class="sidebar-label">레이아웃 이름
                <input id="layout-name" class="sidebar-input" name="layout-name" list="layout-name-options" />
                <datalist id="layout-name-options">
                  <option value="cover"></option>
                  <option value="목차"></option>
                  <option value="closing"></option>
                  <option value="본문"></option>
                </datalist>
              </label>
              <button id="save-template" class="sidebar-btn-primary">현재 레이아웃 저장</button>
            </div>
            <div class="sidebar-divider"></div>
            <div class="sidebar-section">
              <span class="sidebar-label sidebar-label-primary">Checkpoint</span>
              <label class="sidebar-label">저장 지점
                <select id="checkpoint-name" class="sidebar-input" name="checkpoint-name"></select>
              </label>
              <button id="create-checkpoint" class="sidebar-btn-primary">현재 상태 저장</button>
              <button id="restore-checkpoint" class="sidebar-btn-primary">선택 checkpoint 복원</button>
            </div>
            <div class="sidebar-divider"></div>
            <div class="sidebar-section">
              <span class="sidebar-label sidebar-label-primary">Session</span>
              <div class="sidebar-label" id="copy-session-id">Session: --</div>
              <div class="sidebar-label" id="copy-session-root">Root: --</div>
            </div>
          </div>
        </div>

        <div class="sidebar-hint" id="copy-editor-hint">
          Existing editor shell reused. Copy-specific save panel only.
        </div>
      </aside>
    </div>

    <div class="status-bar">
      <span class="status-message" id="copy-status-message">Loading slides...</span>
    </div>
  </div>

  <script type="module" src="/js/copy-init.js"></script>
</body>
</html>
