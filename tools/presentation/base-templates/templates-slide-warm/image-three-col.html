<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1920px; height: 1080px; overflow: hidden; }
.slide {
  width: 960px; height: 540px;
  transform: scale(2); transform-origin: 0 0;
  overflow: hidden;
  font-family: 'Pretendard Variable', Pretendard, sans-serif;
  background: #FFFBF5;
  padding: 36px 44px;
  display: flex; flex-direction: column;
  gap: 14px;
}
.header {
  display: flex; align-items: center; gap: 14px;
}
.header .emoji {
  width: 48px; height: 48px; border-radius: 50%;
  background: #F5F0EB;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; flex-shrink: 0;
}
.header .title { font-size: 28px; font-weight: 800; color: #2C2420; }
.header .subtitle { font-size: 15px; color: #8C8580; margin-top: 2px; }
.body {
  flex: 1; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;
  min-height: 0;
}
.img-col {
  border-radius: 14px; overflow: hidden;
  display: flex; flex-direction: column;
}
.img-col img {
  width: 100%; flex: 1; object-fit: cover; border-radius: 14px 14px 0 0;
  min-height: 0;
}
.img-col .caption {
  padding: 8px 12px;
  font-size: 12px; color: #8C8580; line-height: 1.4;
  background: #F5F0EB; border-radius: 0 0 14px 14px;
}
.footer {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 13px; color: #8C8580;
  border-top: 1px solid #E8E4E0; padding-top: 12px;
}
.footer-tag { color: #3B82F6; font-weight: 700; }
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <div class="emoji">{{EMOJI}}</div>
    <div>
      <div class="title">{{TITLE}}</div>
      <div class="subtitle">{{SUBTITLE}}</div>
    </div>
  </div>
  <div class="body">
    <div class="img-col">
      <img src="{{IMAGE_1}}" alt="{{CAPTION_1}}">
      <div class="caption">{{CAPTION_1}}</div>
    </div>
    <div class="img-col">
      <img src="{{IMAGE_2}}" alt="{{CAPTION_2}}">
      <div class="caption">{{CAPTION_2}}</div>
    </div>
    <div class="img-col">
      <img src="{{IMAGE_3}}" alt="{{CAPTION_3}}">
      <div class="caption">{{CAPTION_3}}</div>
    </div>
  </div>
  <div class="footer">
    <span>{{FOOTER_LEFT}}</span>
    <span class="footer-tag">{{FOOTER_TAG}}</span>
  </div>
</div>
</body>
</html>
