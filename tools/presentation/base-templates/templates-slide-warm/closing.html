<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1920px; height: 1080px; overflow: hidden; }
.slide {
  width: 960px; height: 540px;
  transform: scale(2); transform-origin: 0 0;
  overflow: hidden;
  font-family: 'Pretendard Variable', Pretendard, sans-serif;
  background: #FFFBF5;
  padding: 36px 44px;
  display: flex; flex-direction: column;
  gap: 18px;
}
.body {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px; text-align: center;
}
.body .emoji { font-size: 40px; }
.body .title { font-size: 28px; font-weight: 800; color: #2C2420; }
.body .subtitle { font-size: 15px; color: #8C8580; line-height: 1.6; white-space: pre-line; }
.info-row {
  display: flex; justify-content: center; gap: 12px;
  flex-wrap: wrap;
}
.info-chip {
  background: #F5F0EB; border-radius: 8px; padding: 8px 16px;
  font-size: 14px; color: #4B4540;
  display: flex; align-items: center; gap: 6px;
}
.info-chip .icon { font-size: 16px; }
.footer {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 13px; color: #8C8580;
  border-top: 1px solid #E8E4E0; padding-top: 12px;
}
.footer-tag { color: #3B82F6; font-weight: 700; }
</style>
</head>
<body>
<div class="slide">
  <div class="body">
    <div class="emoji">{{EMOJI}}</div>
    <div class="title">{{TITLE}}</div>
    <div class="subtitle">{{SUBTITLE}}</div>
    <div class="info-row">
      <div class="info-chip"><span class="icon">{{C1_ICON}}</span><span>{{C1_TEXT}}</span></div>
      <div class="info-chip"><span class="icon">{{C2_ICON}}</span><span>{{C2_TEXT}}</span></div>
      <div class="info-chip"><span class="icon">{{C3_ICON}}</span><span>{{C3_TEXT}}</span></div>
    </div>
  </div>
  <div class="footer">
    <span>{{FOOTER_LEFT}}</span>
    <span class="footer-tag">{{FOOTER_TAG}}</span>
  </div>
</div>
</body>
</html>
