<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1920px; height: 1080px; overflow: hidden; }
.slide {
  width: 960px; height: 540px;
  transform: scale(2); transform-origin: 0 0;
  overflow: hidden;
  font-family: 'Pretendard Variable', Pretendard, sans-serif;
  background: #FFFBF5;
  padding: 36px 44px;
  display: flex; flex-direction: column;
  gap: 18px;
}
.body {
  flex: 1; display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}
.left {
  display: flex; flex-direction: column; justify-content: center; gap: 14px;
}
.badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: #F5F0EB; border-radius: 16px; padding: 5px 12px;
  font-size: 13px; color: #8C8580; width: fit-content;
}
.title { font-size: 36px; font-weight: 800; line-height: 1.2; color: #2C2420; }
.subtitle { font-size: 16px; color: #8C8580; font-weight: 400; }
.right {
  display: flex; flex-direction: column; justify-content: center; gap: 10px;
}
.info-card {
  background: white; border: 1px solid #E8E4E0; border-radius: 12px;
  padding: 14px 18px; display: flex; align-items: center; gap: 14px;
}
.info-card .icon { font-size: 24px; }
.info-card .label { font-size: 12px; color: #8C8580; }
.info-card .value { font-size: 15px; font-weight: 700; color: #2C2420; }
.footer {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 13px; color: #8C8580;
  border-top: 1px solid #E8E4E0; padding-top: 12px;
}
.footer-right { display: flex; gap: 8px; }
.footer-tag {
  background: #F5F0EB; border-radius: 4px; padding: 3px 10px; font-size: 12px; color: #8C8580;
}
</style>
</head>
<body>
<div class="slide">
  <div class="body">
    <div class="left">
      <div class="badge">🎓 {{SERIES}}</div>
      <div class="title">{{TITLE}}</div>
      <div class="subtitle">{{SUBTITLE}}</div>
    </div>
    <div class="right">
      <div class="info-card">
        <div class="icon">📋</div>
        <div><div class="label">{{INFO1_LABEL}}</div><div class="value">{{INFO1_VALUE}}</div></div>
      </div>
      <div class="info-card">
        <div class="icon">🎯</div>
        <div><div class="label">{{INFO2_LABEL}}</div><div class="value">{{INFO2_VALUE}}</div></div>
      </div>
      <div class="info-card">
        <div class="icon">📄</div>
        <div><div class="label">{{INFO3_LABEL}}</div><div class="value">{{INFO3_VALUE}}</div></div>
      </div>
    </div>
  </div>
  <div class="footer">
    <span>{{FOOTER_LEFT}}</span>
    <div class="footer-right">
      <span class="footer-tag">{{TAG1}}</span>
      <span class="footer-tag">{{TAG2}}</span>
    </div>
  </div>
</div>
</body>
</html>
