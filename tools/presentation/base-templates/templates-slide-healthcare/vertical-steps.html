<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1920px; height: 1080px; overflow: hidden; word-break: keep-all; }
.slide {
  width: 960px; height: 540px;
  transform: scale(2); transform-origin: 0 0;
  overflow: hidden;
  font-family: 'Noto Sans KR', sans-serif;
  background: linear-gradient(180deg, #F8FBFF 0%, #EFF6FF 100%);
  color: #1E293B;
  padding: 40px 50px;
  display: flex; flex-direction: column;
  position: relative;
}
.top-bar {
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, #0EA5E9, #10B981);
}
.title { font-size: 28px; font-weight: 700; color: #1E293B; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
.subtitle { font-size: 14px; color: #64748B; margin-bottom: 20px; }
.steps {
  display: flex; flex-direction: column; gap: 10px; flex: 1;
}
.step {
  background: white; border: 1px solid #E2E8F0; border-radius: 12px;
  padding: 16px 20px;
  display: flex; align-items: flex-start; gap: 16px;
}
.step-number {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 15px; color: white;
  flex-shrink: 0;
}
.step-number.s1 { background: #0EA5E9; }
.step-number.s2 { background: #38BDF8; }
.step-number.s3 { background: #10B981; }
.step-content .step-title { font-size: 16px; font-weight: 600; color: #1E293B; margin-bottom: 6px; }
.step-badge-row { display: flex; flex-direction: column; gap: 4px; }
.step-badge-item { display: flex; align-items: center; gap: 10px; font-size: 13px; color: #475569; }
.step-badge {
  font-size: 11px; font-weight: 600; padding: 2px 10px; border-radius: 9999px;
  flex-shrink: 0;
}
.step-badge.cause { background: #E0F2FE; color: #0369A1; }
.step-badge.fix { background: #D1FAE5; color: #065F46; }
.footer {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 13px; color: #94A3B8;
  border-top: 1px solid #E2E8F0; padding-top: 12px; margin-top: 16px;
}
.footer-pill {
  background: #FEF2F2; color: #EF4444; font-weight: 600;
  border-radius: 9999px; padding: 3px 12px; font-size: 12px;
}
</style>
</head>
<body>
<div class="slide">
  <div class="top-bar"></div>
  <div class="title">{{TITLE}}</div>
  <div class="subtitle">{{SUBTITLE}}</div>
  <div class="steps">
    <div class="step">
      <div class="step-number s1">1</div>
      <div class="step-content">
        <div class="step-title">{{S1_TITLE}}</div>
        <div class="step-badge-row">
          <div class="step-badge-item"><span class="step-badge cause">{{S1_BADGE}}</span><span>{{S1_DESC}}</span></div>
          <div class="step-badge-item"><span class="step-badge fix">해결</span><span>{{S1_FIX}}</span></div>
        </div>
      </div>
    </div>
    <div class="step">
      <div class="step-number s2">2</div>
      <div class="step-content">
        <div class="step-title">{{S2_TITLE}}</div>
        <div class="step-badge-row">
          <div class="step-badge-item"><span class="step-badge cause">{{S2_BADGE}}</span><span>{{S2_DESC}}</span></div>
          <div class="step-badge-item"><span class="step-badge fix">해결</span><span>{{S2_FIX}}</span></div>
        </div>
      </div>
    </div>
    <div class="step">
      <div class="step-number s3">3</div>
      <div class="step-content">
        <div class="step-title">{{S3_TITLE}}</div>
        <div class="step-badge-row">
          <div class="step-badge-item"><span class="step-badge cause">{{S3_BADGE}}</span><span>{{S3_DESC}}</span></div>
          <div class="step-badge-item"><span class="step-badge fix">해결</span><span>{{S3_FIX}}</span></div>
        </div>
      </div>
    </div>
  </div>
  <div class="footer">
    <span>{{FOOTER_LEFT}}</span>
    <span>{{FOOTER_TAG}}</span>
  </div>
</div>
</body>
</html>
