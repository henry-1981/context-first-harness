<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1920px; height: 1080px; overflow: hidden; word-break: keep-all; }
.slide {
  width: 960px; height: 540px;
  transform: scale(2); transform-origin: 0 0;
  overflow: hidden;
  font-family: 'Noto Sans KR', sans-serif;
  background: linear-gradient(180deg, #F8FBFF 0%, #EFF6FF 100%);
  color: #1E293B;
  padding: 40px 50px;
  display: flex; flex-direction: column;
  position: relative;
}
.top-bar {
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, #0EA5E9, #10B981);
}
.title { font-size: 28px; font-weight: 700; color: #1E293B; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
.subtitle { font-size: 14px; color: #64748B; margin-bottom: 18px; }
.columns {
  display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
  flex: 1;
}
.column {
  background: white; border: 1px solid #E2E8F0; border-radius: 16px;
  padding: 20px 20px;
  display: flex; flex-direction: column; gap: 12px;
  position: relative; overflow: hidden;
}
.column::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
}
.column.left-col::before { background: #0EA5E9; }
.column.right-col::before { background: #10B981; }
.col-badge {
  display: inline-flex; padding: 3px 12px; border-radius: 9999px;
  font-size: 12px; font-weight: 600; width: fit-content;
}
.col-badge.left-badge { background: #E0F2FE; color: #0369A1; }
.col-badge.right-badge { background: #D1FAE5; color: #065F46; }
.col-title { font-size: 17px; font-weight: 700; color: #1E293B; }
.col-item {
  display: flex; align-items: flex-start; gap: 10px;
  font-size: 14px; line-height: 1.4; color: #334155;
}
.col-item::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  flex-shrink: 0; margin-top: 6px;
}
.left-col .col-item::before { background: #0EA5E9; }
.right-col .col-item::before { background: #10B981; }
.bottom-note {
  background: #F0F9FF; border-left: 3px solid #0EA5E9; border-radius: 0 8px 8px 0;
  padding: 12px 18px; margin-top: 12px;
  font-size: 13px; line-height: 1.5; color: #475569;
}
.footer {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 13px; color: #94A3B8;
  border-top: 1px solid #E2E8F0; padding-top: 12px; margin-top: 12px;
}
.footer-pill {
  background: #F0F9FF; color: #0EA5E9; font-weight: 600;
  border-radius: 9999px; padding: 3px 12px; font-size: 12px;
}
</style>
</head>
<body>
<div class="slide">
  <div class="top-bar"></div>
  <div class="title">{{TITLE}}</div>
  <div class="subtitle">{{SUBTITLE}}</div>
  <div class="columns">
    <div class="column left-col">
      <div class="col-badge left-badge">{{LEFT_BADGE}}</div>
      <div class="col-title">{{LEFT_TITLE}}</div>
      <div class="col-item"><span>{{L1_TEXT}}</span></div>
      <div class="col-item"><span>{{L2_TEXT}}</span></div>
      <div class="col-item"><span>{{L3_TEXT}}</span></div>
      <div class="col-item"><span>{{L4_TEXT}}</span></div>
    </div>
    <div class="column right-col">
      <div class="col-badge right-badge">{{RIGHT_BADGE}}</div>
      <div class="col-title">{{RIGHT_TITLE}}</div>
      <div class="col-item"><span>{{R1_TEXT}}</span></div>
      <div class="col-item"><span>{{R2_TEXT}}</span></div>
      <div class="col-item"><span>{{R3_TEXT}}</span></div>
      <div class="col-item"><span>{{R4_TEXT}}</span></div>
    </div>
  </div>
  <div class="bottom-note">{{BOTTOM_NOTE}}</div>
  <div class="footer">
    <span>{{FOOTER_LEFT}}</span>
    <span>{{FOOTER_TAG}}</span>
  </div>
</div>
</body>
</html>
