<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1920px; height: 1080px; overflow: hidden; word-break: keep-all; }
.slide {
  width: 960px; height: 540px;
  transform: scale(2); transform-origin: 0 0;
  overflow: hidden;
  font-family: 'Noto Sans KR', sans-serif;
  background: linear-gradient(180deg, #F8FBFF 0%, #EFF6FF 100%);
  color: #1E293B;
  padding: 40px 50px;
  display: flex; flex-direction: column;
  position: relative;
}
.top-bar {
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, #0EA5E9, #10B981);
}
.body {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px; text-align: center;
}
.body .title { font-size: 32px; font-weight: 700; color: #1E293B; }
.body .subtitle { font-size: 15px; color: #64748B; line-height: 1.6; white-space: pre-line; }
.info-row {
  display: flex; justify-content: center; gap: 12px;
  flex-wrap: wrap; margin-top: 8px;
}
.info-chip {
  background: white; border: 1px solid #E2E8F0; border-radius: 9999px;
  padding: 8px 20px;
  font-size: 13px; color: #475569;
}
.footer {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 13px; color: #94A3B8;
  border-top: 1px solid #E2E8F0; padding-top: 12px; margin-top: auto;
}
.footer-pill {
  background: #F0F9FF; color: #0EA5E9; font-weight: 600;
  border-radius: 9999px; padding: 3px 12px; font-size: 12px;
}
</style>
</head>
<body>
<div class="slide">
  <div class="top-bar"></div>
  <div class="body">
    <div class="title">{{TITLE}}</div>
    <div class="subtitle">{{SUBTITLE}}</div>
    <div class="info-row">
      <div class="info-chip">{{C1_TEXT}}</div>
      <div class="info-chip">{{C2_TEXT}}</div>
      <div class="info-chip">{{C3_TEXT}}</div>
    </div>
  </div>
  <div class="footer">
    <span>{{FOOTER_LEFT}}</span>
    <span>{{FOOTER_TAG}}</span>
  </div>
</div>
</body>
</html>
