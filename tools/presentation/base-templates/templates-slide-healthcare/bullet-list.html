<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1920px; height: 1080px; overflow: hidden; word-break: keep-all; }
.slide {
  width: 960px; height: 540px;
  transform: scale(2); transform-origin: 0 0;
  overflow: hidden;
  font-family: 'Noto Sans KR', sans-serif;
  background: linear-gradient(180deg, #F8FBFF 0%, #EFF6FF 100%);
  color: #1E293B;
  padding: 40px 50px;
  display: flex; flex-direction: column;
  position: relative;
}
.top-bar {
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, #0EA5E9, #10B981);
}
.title { font-size: 28px; font-weight: 700; color: #1E293B; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
.subtitle { font-size: 14px; color: #64748B; margin-bottom: 20px; }
.content-box {
  background: white; border: 1px solid #E2E8F0; border-radius: 16px;
  padding: 24px 28px;
  display: flex; flex-direction: column; gap: 16px;
  flex: 1;
}
.bullet {
  display: flex; align-items: flex-start; gap: 14px;
  font-size: 15px; line-height: 1.5; color: #1E293B;
}
.bullet .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #0EA5E9; flex-shrink: 0; margin-top: 7px;
}
.bullet .text b { font-weight: 600; }
.bullet .text .sub { display: block; font-size: 13px; color: #64748B; margin-top: 2px; }
.note {
  background: #F0F9FF; border-left: 3px solid #0EA5E9; border-radius: 0 8px 8px 0;
  padding: 12px 18px;
  font-size: 14px; color: #475569; line-height: 1.5;
  margin-top: auto;
}
.footer {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 13px; color: #94A3B8;
  border-top: 1px solid #E2E8F0; padding-top: 12px; margin-top: 16px;
}
.footer-pill {
  background: #F0F9FF; color: #0EA5E9; font-weight: 600;
  border-radius: 9999px; padding: 3px 12px; font-size: 12px;
}
</style>
</head>
<body>
<div class="slide">
  <div class="top-bar"></div>
  <div class="title">{{TITLE}}</div>
  <div class="subtitle">{{SUBTITLE}}</div>
  <div class="content-box">
    <div class="bullet"><span class="dot"></span><span class="text"><b>{{B1_TITLE}}</b><span class="sub">{{B1_DESC}}</span></span></div>
    <div class="bullet"><span class="dot"></span><span class="text"><b>{{B2_TITLE}}</b><span class="sub">{{B2_DESC}}</span></span></div>
    <div class="bullet"><span class="dot"></span><span class="text"><b>{{B3_TITLE}}</b><span class="sub">{{B3_DESC}}</span></span></div>
    <div class="bullet"><span class="dot"></span><span class="text"><b>{{B4_TITLE}}</b><span class="sub">{{B4_DESC}}</span></span></div>
  </div>
  <div class="note">{{NOTE}}</div>
  <div class="footer">
    <span>{{FOOTER_LEFT}}</span>
    <span>{{FOOTER_TAG}}</span>
  </div>
</div>
</body>
</html>
