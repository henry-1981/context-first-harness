<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1920px; height: 1080px; overflow: hidden; word-break: keep-all; }
.slide {
  width: 960px; height: 540px;
  transform: scale(2); transform-origin: 0 0;
  overflow: hidden;
  font-family: 'Noto Sans KR', sans-serif;
  background: linear-gradient(180deg, #F8FBFF 0%, #EFF6FF 100%);
  color: #1E293B;
  padding: 40px 50px;
  display: flex; flex-direction: column;
  gap: 14px;
  position: relative;
}
.top-bar {
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, #0EA5E9, #10B981);
}
.title { font-size: 28px; font-weight: 700; color: #1E293B; margin-bottom: 2px; }
.subtitle { font-size: 14px; color: #64748B; margin-bottom: 4px; }
.body {
  flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
  min-height: 0;
}
.img-col {
  border-radius: 16px; overflow: hidden;
  display: flex; flex-direction: column;
  border: 1px solid #E2E8F0;
  background: white;
}
.img-col img {
  width: 100%; flex: 1; object-fit: cover;
  min-height: 0;
}
.img-col .caption {
  padding: 10px 14px;
  font-size: 13px; color: #64748B; line-height: 1.4;
  background: #F0F9FF;
}
.footer {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 13px; color: #94A3B8;
  border-top: 1px solid #E2E8F0; padding-top: 12px;
}
.footer-pill {
  background: #F0F9FF; color: #0EA5E9; font-weight: 600;
  border-radius: 9999px; padding: 3px 12px; font-size: 12px;
}
</style>
</head>
<body>
<div class="slide">
  <div class="top-bar"></div>
  <div class="title">{{TITLE}}</div>
  <div class="subtitle">{{SUBTITLE}}</div>
  <div class="body">
    <div class="img-col">
      <img src="{{IMAGE_1}}" alt="{{CAPTION_1}}">
      <div class="caption">{{CAPTION_1}}</div>
    </div>
    <div class="img-col">
      <img src="{{IMAGE_2}}" alt="{{CAPTION_2}}">
      <div class="caption">{{CAPTION_2}}</div>
    </div>
  </div>
  <div class="footer">
    <span>{{FOOTER_LEFT}}</span>
    <span class="footer-pill">{{FOOTER_TAG}}</span>
  </div>
</div>
</body>
</html>
