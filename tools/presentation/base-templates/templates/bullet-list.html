<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Pretendard Variable', Pretendard, sans-serif;
  background: #F5F0EB;
  display: flex; justify-content: center; padding: 40px 0;
}
.card {
  width: 880px;
  background: #FFFBF5;
  border-radius: 20px;
  padding: 48px 52px;
  display: flex; flex-direction: column;
  gap: 28px;
}
.header {
  display: flex; align-items: center; gap: 16px;
}
.header .emoji {
  width: 52px; height: 52px; border-radius: 50%;
  background: #F5F0EB;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; flex-shrink: 0;
}
.header .title { font-size: 28px; font-weight: 800; color: #2C2420; }
.header .subtitle { font-size: 15px; color: #8C8580; margin-top: 2px; }
.content-box {
  background: white; border: 1px solid #E8E4E0; border-radius: 16px;
  padding: 32px 28px;
  display: flex; flex-direction: column; gap: 18px;
}
.centered .content-box {
  width: fit-content; min-width: 480px;
  margin: 0 auto; padding: 32px 48px;
}
.bullet {
  display: flex; align-items: flex-start; gap: 12px;
  font-size: 16px; line-height: 1.6; color: #2C2420;
}
.bullet .icon { font-size: 18px; flex-shrink: 0; margin-top: 2px; }
.bullet .text b { font-weight: 700; }
.bullet .text .sub { display: block; font-size: 14px; color: #8C8580; margin-top: 2px; }
.note {
  background: #F5F0EB; border-radius: 12px; padding: 16px 20px;
  font-size: 14px; color: #4B4540; line-height: 1.6;
  display: flex; align-items: flex-start; gap: 10px;
}
.note .icon { font-size: 18px; flex-shrink: 0; }
.footer {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 13px; color: #8C8580;
  padding-top: 8px;
}
.footer-tag { color: #3B82F6; font-weight: 700; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="emoji">{{EMOJI}}</div>
    <div>
      <div class="title">{{TITLE}}</div>
      <div class="subtitle">{{SUBTITLE}}</div>
    </div>
  </div>
  <div class="content-box">
    <div class="bullet"><span class="icon">{{B1_ICON}}</span><span class="text"><b>{{B1_TITLE}}</b><span class="sub">{{B1_DESC}}</span></span></div>
    <div class="bullet"><span class="icon">{{B2_ICON}}</span><span class="text"><b>{{B2_TITLE}}</b><span class="sub">{{B2_DESC}}</span></span></div>
    <div class="bullet"><span class="icon">{{B3_ICON}}</span><span class="text"><b>{{B3_TITLE}}</b><span class="sub">{{B3_DESC}}</span></span></div>
    <div class="bullet"><span class="icon">{{B4_ICON}}</span><span class="text"><b>{{B4_TITLE}}</b><span class="sub">{{B4_DESC}}</span></span></div>
  </div>
  <div class="note">
    <span class="icon">💡</span>
    <span>{{NOTE}}</span>
  </div>
  <div class="footer">
    <span>{{FOOTER_LEFT}}</span>
    <span class="footer-tag">{{FOOTER_TAG}}</span>
  </div>
</div>
</body>
</html>
