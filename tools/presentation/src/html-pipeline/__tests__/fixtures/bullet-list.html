<!DOCTYPE html>
<html><head><style>
html, body { width: 1920px; height: 1080px; margin: 0; }
.slide { width: 960px; height: 540px; transform: scale(2); transform-origin: 0 0; font-family: sans-serif; padding: 40px 50px; }
.title { font-size: 28px; font-weight: 700; margin-bottom: 20px; }
.bullet { display: flex; align-items: flex-start; gap: 14px; font-size: 15px; line-height: 1.5; margin-bottom: 16px; }
.bullet .dot { width: 8px; height: 8px; border-radius: 50%; background: #0EA5E9; flex-shrink: 0; margin-top: 7px; }
.bullet .text b { font-weight: 600; }
.bullet .text .sub { display: block; font-size: 13px; color: #64748B; margin-top: 2px; }
</style></head><body>
<div class="slide">
  <div class="title">테스트 슬라이드</div>
  <div class="bullet"><span class="dot"></span><span class="text"><b>제목 텍스트</b><span class="sub">설명 텍스트입니다.</span></span></div>
  <div class="bullet"><span class="dot"></span><span class="text"><b>두번째 제목</b><span class="sub">두번째 설명</span></span></div>
</div>
</body></html>
