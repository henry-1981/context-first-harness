<!DOCTYPE html>
<html><head><style>
html, body { width: 1920px; height: 1080px; margin: 0; }
.slide { width: 960px; height: 540px; transform: scale(2); transform-origin: 0 0; font-family: sans-serif; padding: 40px 50px; }
.title { font-size: 28px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.badge { background: #0EA5E9; color: #fff; border-radius: 4px; padding: 2px 8px; font-size: 13px; }
.subtitle { font-size: 14px; color: #64748B; }
</style></head><body>
<div class="slide">
  <div class="title"><span class="badge">섹션1</span> 테스트 타이틀</div>
  <div class="subtitle">서브타이틀 텍스트</div>
</div>
</body></html>
