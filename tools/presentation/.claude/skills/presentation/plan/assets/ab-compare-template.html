<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<title>A/B 스타일 비교</title>
<style>
  body { margin:0; font-family:sans-serif; background:#f5f5f5; }
  .header { padding:16px 24px; background:#fff; border-bottom:1px solid #e0e0e0; }
  .header h2 { margin:0; }
  .grid {
    display:grid;
    grid-template-columns: 56px 1fr 1fr;
    grid-template-rows: auto 1fr 1fr;
    gap:12px;
    padding:16px;
  }
  .corner { /* top-left empty cell */ }
  .col-header {
    background:#fff;
    border-radius:6px;
    padding:10px 16px;
    font-weight:600;
    font-size:14px;
    text-align:center;
    box-shadow:0 1px 3px rgba(0,0,0,.08);
  }
  .row-header {
    display:flex;
    align-items:center;
    justify-content:center;
    background:#fff;
    border-radius:6px;
    font-size:13px;
    color:#555;
    writing-mode:vertical-rl;
    text-orientation:mixed;
    padding:8px 0;
    box-shadow:0 1px 3px rgba(0,0,0,.08);
  }
  .cell {
    background:#fff;
    border-radius:8px;
    overflow:hidden;
    box-shadow:0 1px 3px rgba(0,0,0,.1);
  }
  .cell img { width:100%; height:auto; display:block; }
</style>
</head><body>
<div class="header"><h2>A/B 스타일 비교</h2></div>
<div class="grid">
  <div class="corner"></div>
  <div class="col-header">{{LABEL_A}}</div>
  <div class="col-header">{{LABEL_B}}</div>

  <div class="row-header">표지</div>
  <div class="cell"><img src="a/slide-01.png"></div>
  <div class="cell"><img src="b/slide-01.png"></div>

  <div class="row-header">본문</div>
  <div class="cell"><img src="a/slide-03.png"></div>
  <div class="cell"><img src="b/slide-03.png"></div>
</div>
</body></html>
